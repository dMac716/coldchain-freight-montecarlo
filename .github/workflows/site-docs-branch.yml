name: Site Docs Branch Publish

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - '.github/workflows/ci.yml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-and-commit-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Verify R version
        shell: bash
        run: |
          Rscript -e 'cat("R.version.string=", R.version.string, "\n", sep=""); stopifnot(getRversion() >= "4.4.0")'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Restore renv + install UI deps
        shell: bash
        run: |
          Rscript -e 'install.packages("renv", repos="https://cloud.r-project.org"); renv::restore(prompt = FALSE)'
          Rscript -e 'pkgs <- c("leaflet","optparse","digest","jsonlite"); missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing) > 0) install.packages(missing, repos = "https://cloud.r-project.org")'

      - name: Build UI artifacts (best-effort offline)
        shell: bash
        run: |
          Rscript tools/derive_ui_artifacts.R --top_n 200 || true

      - name: Render Quarto site into docs
        shell: bash
        run: |
          rm -rf site/_freeze
          quarto render site/

      - name: Commit rendered docs (if changed)
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain docs)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs
            git commit -m "chore: update rendered docs site [skip ci]"
            git push
          else
            echo "No docs changes to commit."
          fi

