name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: renv/library
          key: ${{ runner.os }}-pages-renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pages-renv-

      - name: Cache renv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/R/renv
          key: ${{ runner.os }}-pages-renv-downloads-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pages-renv-downloads-

      - name: Build site (cached path)
        id: build_cached
        continue-on-error: true
        shell: bash
        run: |
          Rscript -e 'install.packages("renv", repos="https://cloud.r-project.org"); renv::restore(prompt = FALSE)'
          Rscript -e 'pkgs <- c("leaflet","optparse","digest","jsonlite"); missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing) > 0) install.packages(missing, repos = "https://cloud.r-project.org")'
          Rscript tools/derive_ui_artifacts.R --top_n 200 || true
          rm -rf site/_freeze
          quarto render site/

      - name: Fallback clean build (no cache)
        if: steps.build_cached.outcome == 'failure'
        shell: bash
        run: |
          rm -rf renv/library ~/.cache/R/renv site/_freeze
          Rscript -e 'install.packages("renv", repos="https://cloud.r-project.org"); renv::restore(prompt = FALSE)'
          Rscript -e 'pkgs <- c("leaflet","optparse","digest","jsonlite"); missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing) > 0) install.packages(missing, repos = "https://cloud.r-project.org")'
          Rscript tools/derive_ui_artifacts.R --top_n 200 || true
          quarto render site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
