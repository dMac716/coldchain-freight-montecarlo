name: R-CMD-check

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel'}
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
    
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: r-lib/actions/setup-pandoc@v2
      
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
      
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::devtools
          needs: check
      
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

  test-coverage:
    runs-on: ubuntu-latest
    
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::covr
            any::testthat
          needs: coverage
      
      - name: Test coverage
        run: |
          covr::codecov(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package")
          )
        shell: Rscript {0}

  lint:
    runs-on: ubuntu-latest
    
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::lintr
          needs: check
      
      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}

  validate-offline:
    runs-on: ubuntu-latest
    name: Validate Offline Operation
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      
      - uses: r-lib/actions/setup-r-dependencies@v2
      
      - name: Check for network calls
        run: |
          # Search for common network-related functions
          if grep -r "curl\|httr\|download\.file\|url\|RCurl" R/ --include="*.R"; then
            echo "Warning: Found potential network calls in R/ directory"
            echo "Please verify these are not runtime API calls"
          else
            echo "No obvious network calls found - offline requirement likely satisfied"
          fi
        shell: bash
      
      - name: Test basic functionality offline
        run: |
          # Disable network
          library(coldchainfreight)
          
          # Test basic functions work without network
          result <- calculate_emissions(500, 20, FALSE, 20, 30)
          print(result)
          
          # Test validation
          validate_inputs(list(distance_km = 500))
          
          print("Offline functionality test passed!")
        shell: Rscript {0}

  test-reproducibility:
    runs-on: ubuntu-latest
    name: Test Reproducibility
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      
      - uses: r-lib/actions/setup-r-dependencies@v2
      
      - name: Test reproducibility with fixed seed
        run: |
          library(coldchainfreight)
          
          params <- list(
            distance_mean = 500, distance_sd = 100,
            payload_mean = 20, payload_sd = 5,
            temp_mean = 20, temp_sd = 5,
            fuel_efficiency_mean = 30, fuel_efficiency_sd = 5,
            refrigeration_prob = 0.3
          )
          
          # Initialize log
          log_file <- tempfile(fileext = ".json")
          init_reproducibility_log(log_file)
          
          # Run same chunk twice with same seed
          result1 <- run_mc_chunk(1, 100, 12345, params)
          result2 <- run_mc_chunk(1, 100, 12345, params)
          
          # Check reproducibility
          if (!identical(result1$results$co2_emissions_kg, result2$results$co2_emissions_kg)) {
            stop("Reproducibility test failed: Results differ with same seed!")
          }
          
          print("Reproducibility test passed!")
          print(paste("Mean CO2:", mean(result1$results$co2_emissions_kg)))
        shell: Rscript {0}

  validate-schema:
    runs-on: ubuntu-latest
    name: Validate JSON Schema
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install JSON schema validator
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install jsonschema
      
      - name: Validate schema is well-formed
        run: |
          python3 -c "
          import json
          import jsonschema
          
          with open('inst/schemas/contribution_artifact_schema.json', 'r') as f:
              schema = json.load(f)
          
          # Check schema is valid
          jsonschema.Draft7Validator.check_schema(schema)
          print('Schema is valid!')
          "
