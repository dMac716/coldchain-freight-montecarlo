name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '.github/workflows/pages.yml'
      - 'README.md'
      - 'AGENTS.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '.github/workflows/pages.yml'
      - 'README.md'
      - 'AGENTS.md'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  r-ci:
    name: R CI
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      DISABLE_CLOUD_ADAPTERS: "1"
      REFRESH_DATA: "0"
      RENV_PATHS_ROOT: ~/.cache/R/renv

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcurl4-openssl-dev libssl-dev libxml2-dev

      # ---- Unified R package cache ----
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/R/renv
            renv/library
          key: ${{ runner.os }}-r-ci-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-r-ci-

      - name: Install R packages
        run: |
          Rscript -e '
            install.packages("renv", repos="https://cloud.r-project.org")
            renv::restore(prompt = FALSE)
            # Install test/build deps not in renv.lock
            for (p in c("testthat", "targets", "rprojroot")) {
              if (!requireNamespace(p, quietly = TRUE))
                install.packages(p, repos = "https://cloud.r-project.org")
            }
          '

      # ---- JSON schema validation (PRs only) ----
      - name: Validate contribution artifacts
        if: github.event_name == 'pull_request'
        run: |
          if [ -d "contrib/incoming" ]; then
            npm install -g ajv-cli@5 ajv-formats@2
            for f in contrib/incoming/*.json; do
              [ -f "$f" ] && ajv validate -s schemas/chunk_artifact.schema.json -d "$f" --all-errors --spec=draft2020 --formats
            done
          fi

      - name: Validate input CSV contracts
        run: Rscript tools/validate_inputs.R --mode SMOKE_LOCAL

      - name: Run unit tests
        run: Rscript -e 'testthat::test_dir("tests/testthat")'

      - name: Run smoke test
        run: bash tools/smoke_test.sh

      - name: Run targets pipeline
        run: Rscript -e 'targets::tar_make(callr_function = NULL)'
