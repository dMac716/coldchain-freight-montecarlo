name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '.github/workflows/pages.yml'
      - 'README.md'
      - 'AGENTS.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '.github/workflows/pages.yml'
      - 'README.md'
      - 'AGENTS.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  r-ci:
    runs-on: ubuntu-latest

    env:
      # Force offline-first behavior in CI
      DISABLE_CLOUD_ADAPTERS: "1"
      REFRESH_DATA: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- JSON artifact schema validation (PRs only) ----
      - name: Setup Node
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Validate contribution artifacts (JSON Schema)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "schemas/chunk_artifact.schema.json" ]; then
            echo "Schema file schemas/chunk_artifact.schema.json not found; failing."
            exit 1
          fi

          if [ ! -d "contrib/incoming" ]; then
            echo "No contrib/incoming directory; skipping schema validation."
            exit 0
          fi

          shopt -s nullglob
          files=(contrib/incoming/*.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No incoming JSON artifacts; skipping schema validation."
            exit 0
          fi

          echo "Installing ajv-cli..."
          npm install -g ajv-cli@5 ajv-formats@2

          echo "Validating JSON artifacts against schema..."
          for f in "${files[@]}"; do
            echo "Validating: $f"
            ajv validate \
              -s schemas/chunk_artifact.schema.json \
              -d "$f" \
              --all-errors \
              --verbose \
              --spec=draft2020 \
              --formats
          done

          echo "Schema validation passed."

      # ---- R setup ----
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Verify R version
        shell: bash
        run: |
          Rscript -e 'cat("R.version.string=", R.version.string, "\n", sep=""); stopifnot(getRversion() >= "4.4.0")'

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      # ---- Cache and restore renv ----
      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: renv/library
          key: ${{ runner.os }}-renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Restore renv
        shell: bash
        run: |
          Rscript -e 'install.packages("renv", repos="https://cloud.r-project.org"); renv::restore(prompt = FALSE)'

      - name: Validate input CSV contracts
        shell: bash
        run: |
          Rscript tools/validate_inputs.R --mode SMOKE_LOCAL

      # ---- Unit tests ----
      - name: Run unit tests (testthat)
        shell: bash
        run: |
          Rscript -e 'install.packages("testthat", repos="https://cloud.r-project.org"); testthat::test_dir("tests/testthat")'

      - name: Run smoke test (chunk + aggregate)
        shell: bash
        run: |
          bash tools/smoke_test.sh

      # ---- Pipeline wiring smoke test ----
      - name: Run targets pipeline (smoke test)
        shell: bash
        run: |
          Rscript -e 'install.packages("targets", repos="https://cloud.r-project.org"); targets::tar_make(callr_function = NULL)'

      # ---- Optional Quarto render (non-fatal) ----
      - name: Render Quarto report (optional smoke render)
        shell: bash
        run: |
          if [ -f "report/report.qmd" ]; then
            echo "Attempting Quarto render..."
            if command -v quarto >/dev/null 2>&1; then
              quarto render report/report.qmd --to html
            else
              echo "Quarto CLI not found on runner; skipping render."
            fi
          else
            echo "No report/report.qmd found; skipping render."
          fi
