name: Render Run Graphs

on:
  workflow_dispatch:
    inputs:
      run_dir:
        description: "Path to run directory (e.g. runs/my-run-001)"
        required: true
        type: string
      force:
        description: "Overwrite existing graphs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: render-${{ github.repository }}-${{ inputs.run_dir }}
  cancel-in-progress: false

jobs:
  render:
    name: Render graphs — ${{ inputs.run_dir }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate run_dir input
        env:
          RUN_DIR: ${{ inputs.run_dir }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "$RUN_DIR" ]]; then
            echo "::error::run_dir '$RUN_DIR' does not exist in this workspace."
            exit 1
          fi

      - name: Derive run basename for artifact naming
        id: run_info
        env:
          RUN_DIR: ${{ inputs.run_dir }}
        shell: bash
        run: |
          set -euo pipefail
          RUN_BASENAME="$(basename "$RUN_DIR")"
          echo "run_basename=${RUN_BASENAME}" >> "$GITHUB_OUTPUT"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v5
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-render-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            r-render-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev \
            libpng-dev

      - name: Bootstrap R packages
        run: Rscript scripts/bootstrap.R

      - name: Render graphs
        env:
          RUN_DIR: ${{ inputs.run_dir }}
          FORCE_INPUT: ${{ inputs.force }}
        shell: bash
        run: |
          set -euo pipefail
          FORCE_FLAG=""
          if [[ "$FORCE_INPUT" == "true" ]]; then FORCE_FLAG="--force"; fi
          Rscript scripts/render_run_graphs.R \
            --run_dir "$RUN_DIR" \
            $FORCE_FLAG

      - name: Show summary
        env:
          RUN_DIR: ${{ inputs.run_dir }}
        shell: bash
        run: |
          set -euo pipefail
          SUMMARY="${RUN_DIR}/summary.json"
          if [[ -f "$SUMMARY" ]]; then
            echo "--- summary.json ---"
            cat "$SUMMARY"
          fi

      - name: Upload graphs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: graphs-${{ steps.run_info.outputs.run_basename }}-${{ github.run_id }}
          path: ${{ inputs.run_dir }}/graphs/
          if-no-files-found: warn
          retention-days: 30
