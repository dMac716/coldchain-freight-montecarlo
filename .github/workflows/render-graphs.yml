name: Render Run Graphs

on:
  workflow_dispatch:
    inputs:
      run_dir:
        description: "Path to run directory (e.g. runs/my-run-001)"
        required: true
        type: string
      force:
        description: "Overwrite existing graphs"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  render:
    name: Render graphs for ${{ inputs.run_dir }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate run_dir input
        run: |
          if [[ ! -d "${{ inputs.run_dir }}" ]]; then
            echo "::error::run_dir '${{ inputs.run_dir }}' does not exist in this workspace."
            exit 1
          fi

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-render-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            r-render-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev \
            libpng-dev

      - name: Bootstrap R packages
        run: Rscript scripts/bootstrap.R

      - name: Render graphs
        run: |
          FORCE_FLAG=""
          [[ "${{ inputs.force }}" == "true" ]] && FORCE_FLAG="--force"
          Rscript scripts/render_run_graphs.R \
            --run_dir "${{ inputs.run_dir }}" \
            $FORCE_FLAG

      - name: Show summary
        run: |
          SUMMARY="${{ inputs.run_dir }}/summary.json"
          if [[ -f "$SUMMARY" ]]; then
            echo "--- summary.json ---"
            cat "$SUMMARY"
          fi

      - name: Upload graphs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: graphs-${{ github.run_id }}
          path: ${{ inputs.run_dir }}/graphs/
          if-no-files-found: warn
          retention-days: 30
