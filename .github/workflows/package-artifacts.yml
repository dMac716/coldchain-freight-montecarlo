name: Package Run Artifacts

on:
  workflow_dispatch:
    inputs:
      run_dir:
        description: "Path to run directory (e.g. runs/my-run-001)"
        required: true
        type: string
      force:
        description: "Overwrite existing artifact.tar.gz"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  workflow_call:
    inputs:
      run_dir:
        description: "Path to run directory"
        required: true
        type: string
      force:
        required: false
        default: "false"
        type: string

permissions:
  contents: read

concurrency:
  group: package-${{ github.repository }}-${{ inputs.run_dir }}
  cancel-in-progress: false

jobs:
  package:
    name: Package — ${{ inputs.run_dir }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate run_dir input
        env:
          RUN_DIR: ${{ inputs.run_dir }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "$RUN_DIR" ]]; then
            echo "::error::run_dir '$RUN_DIR' does not exist."
            exit 1
          fi

      - name: Derive run basename for artifact naming
        id: run_info
        env:
          RUN_DIR: ${{ inputs.run_dir }}
        shell: bash
        run: |
          set -euo pipefail
          RUN_BASENAME="$(basename "$RUN_DIR")"
          echo "run_basename=${RUN_BASENAME}" >> "$GITHUB_OUTPUT"

      - name: Package artifact
        env:
          RUN_DIR: ${{ inputs.run_dir }}
          FORCE_INPUT: ${{ inputs.force }}
        shell: bash
        run: |
          set -euo pipefail
          FORCE_FLAG=""
          if [[ "$FORCE_INPUT" == "true" ]]; then FORCE_FLAG="--force"; fi
          bash scripts/package_run_artifact.sh "$RUN_DIR" $FORCE_FLAG

      - name: Show artifact info
        env:
          RUN_DIR: ${{ inputs.run_dir }}
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT="${RUN_DIR}/artifact.tar.gz"
          if [[ -f "$ARTIFACT" ]]; then
            echo "Artifact size: $(du -sh "$ARTIFACT" | cut -f1)"
            echo "Contents:"
            tar -tzf "$ARTIFACT"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: run-artifact-${{ steps.run_info.outputs.run_basename }}-${{ github.run_id }}
          path: ${{ inputs.run_dir }}/artifact.tar.gz
          if-no-files-found: error
          retention-days: 90
