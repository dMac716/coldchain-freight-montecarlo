name: Site Preflight

on:
  pull_request:
    paths:
      - 'site/**'
      - 'tools/derive_ui_artifacts.R'
      - 'tools/build_google_routes_cache.R'
      - 'R/08_io.R'
      - 'data/inputs_local/**'
      - 'data/derived/**'
      - 'renv.lock'
      - '.github/workflows/site-docs-branch.yml'
      - '.github/workflows/pages.yml'
      - '.github/workflows/site-preflight.yml'
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'tools/derive_ui_artifacts.R'
      - 'tools/build_google_routes_cache.R'
      - 'R/08_io.R'
      - 'data/inputs_local/**'
      - 'data/derived/**'
      - 'renv.lock'
      - '.github/workflows/site-docs-branch.yml'
      - '.github/workflows/pages.yml'
      - '.github/workflows/site-preflight.yml'
  workflow_dispatch:

concurrency:
  group: site-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Verify R version
        shell: bash
        run: |
          Rscript -e 'cat("R.version.string=", R.version.string, "\n", sep=""); stopifnot(getRversion() >= "4.4.0")'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies for spatial R packages
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libpng-dev

      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: renv/library
          key: ${{ runner.os }}-site-preflight-renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-site-preflight-renv-

      - name: Cache renv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/R/renv
          key: ${{ runner.os }}-site-preflight-renv-downloads-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-site-preflight-renv-downloads-

      - name: Restore renv + install UI deps
        shell: bash
        run: |
          Rscript -e 'install.packages("renv", repos="https://cloud.r-project.org"); renv::restore(prompt = FALSE)'
          Rscript -e 'install.packages(c("png", "terra", "units"), repos = "https://cloud.r-project.org")'
          Rscript -e 'install.packages(c("raster", "sf"), repos = "https://cloud.r-project.org")'
          Rscript -e 'pkgs <- c("htmlwidgets", "htmltools", "leaflet", "optparse", "digest", "jsonlite"); missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing) > 0) install.packages(missing, repos = "https://cloud.r-project.org")'

      - name: Build UI artifacts (best-effort offline)
        shell: bash
        run: |
          Rscript tools/derive_ui_artifacts.R --top_n 200 || true

      - name: Render Quarto site smoke
        shell: bash
        run: |
          rm -rf site/_freeze
          quarto render site/ --no-clean

      - name: Validate rendered outputs exist
        shell: bash
        run: |
          test -f docs/index.html
          test -f docs/viz/flow_map.html
          test -f docs/viz/scenario_explorer.html

