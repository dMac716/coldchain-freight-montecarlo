name: Lint

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (R + shell)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Install lintr
        shell: bash
        run: |
          Rscript -e 'install.packages("lintr", repos="https://cloud.r-project.org")'

      - name: Run lintr
        shell: bash
        run: |
          Rscript -e 'lintr::lint_dir()'

      - name: Install shellcheck
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Shellcheck tools scripts
        shell: bash
        run: |
          set -euo pipefail
          # Exclude scripts with embedded R/heredoc code that cause parse false positives
          EXCLUDE="gcs_full_audit.sh|bootstrap_worker.sh|bootstrap_gcp_worker.sh|codespace_autorun.sh|codespace_run_production.sh"
          find tools -maxdepth 1 -type f -name "*.sh" -print0 | \
            grep -zvE "$EXCLUDE" | \
            xargs -0 -r shellcheck --severity=warning
          if [[ -f .devcontainer/postCreate.sh ]]; then
            shellcheck --severity=warning .devcontainer/postCreate.sh
          fi

      - name: Check Makefile CLI contract
        shell: bash
        run: |
          bash tools/check_makefile_cli_contract.sh Makefile
