name: Lint

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (R + shell)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Cache lintr
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/R/renv
            ~/R/x86_64-pc-linux-gnu-library
          key: ${{ runner.os }}-lintr-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-lintr-

      - name: Install lintr
        run: |
          Rscript -e 'if (!requireNamespace("lintr", quietly=TRUE)) install.packages("lintr", repos="https://cloud.r-project.org")'

      - name: Run lintr
        run: Rscript -e 'lintr::lint_dir()'

      - name: Shellcheck tools scripts
        run: |
          set -euo pipefail
          EXCLUDE_LIST="gcs_full_audit.sh bootstrap_worker.sh bootstrap_gcp_worker.sh codespace_autorun.sh codespace_run_production.sh build_google_routes_cache_download.sh build_google_routes_outputs_download.sh run_google_routes_cache_pipeline.sh preflight_cloud.sh pull_worker_results.sh submit_results.sh"
          for f in tools/*.sh; do
            base=$(basename "$f")
            skip=false
            for ex in $EXCLUDE_LIST; do
              if [[ "$base" == "$ex" ]]; then skip=true; break; fi
            done
            if [[ "$skip" == "false" ]]; then
              shellcheck --severity=warning "$f"
            fi
          done

      - name: Check Makefile CLI contract
        run: bash tools/check_makefile_cli_contract.sh Makefile
