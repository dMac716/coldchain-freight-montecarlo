# config/stochastic_charger_example.yaml
#
# Reference configuration for the stochastic charger availability feature.
#
# These keys extend the  charging:  block in test_kit.yaml.
# The feature is OFF by default (enable_stochastic_charger_states: false).
# Copy the keys you need into your test_kit.yaml charging: block.
#
# Relationship to existing keys:
#   min_station_power_kw  →  use charger_power_min_kw instead (or both)
#   queue_delay_minutes   →  replaced per-stop by wait_time_occupied when feature is on
#   station_reliability   →  incorporated into p_broken + p_occupied logic
#
# All probabilities are in [0, 1].  Times are in minutes.

charging:

  # -------------------------------------------------------------------------
  # Feature flag
  # -------------------------------------------------------------------------
  # Set true to activate stochastic charger-availability checks.
  # When false all chargers are assumed available and wait times fall back
  # to queue_delay_minutes (existing behaviour, fully preserved).
  enable_stochastic_charger_states: false

  # -------------------------------------------------------------------------
  # Power minimum
  # -------------------------------------------------------------------------
  # Minimum charger power (kW) accepted for a BEV charge stop.
  # Mirrors the existing min_station_power_kw key; override independently
  # when the availability feature is enabled.
  charger_power_min_kw: 150

  # -------------------------------------------------------------------------
  # Availability probabilities
  # -------------------------------------------------------------------------

  # Probability the charger is out-of-service (broken) at time of arrival,
  # regardless of occupancy.  Applied independently per charger per stop.
  p_broken: 0.05

  # Conditional probability the charger is occupied (but not broken)
  # at time of arrival.  Applied only when the charger is not broken.
  p_occupied_given_not_broken: 0.20

  # -------------------------------------------------------------------------
  # Wait time when occupied
  # -------------------------------------------------------------------------
  # Sampled once per occupied-charger event.  The existing
  # queue_delay_minutes distribution is used when the feature is off.
  wait_time_occupied:
    distribution:
      type: triangular
      min:  5     # minutes
      mode: 15
      max:  60

  # -------------------------------------------------------------------------
  # Time-of-day modifiers
  # -------------------------------------------------------------------------
  # Each entry is applied to p_occupied_given_not_broken (multiplicative).
  # hour_start and hour_end are 0-23 (local time).
  # Ranges wrap midnight (e.g., hour_start:22, hour_end:6 → 10 PM – 6 AM).
  # Overlapping ranges are not permitted; first match wins.
  time_of_day_modifiers:
    - hour_start: 6
      hour_end:   9
      label:      "morning_peak"
      occupied_multiplier: 1.5    # heavier truck-stop demand 06:00–09:00

    - hour_start: 11
      hour_end:   14
      label:      "midday"
      occupied_multiplier: 1.3

    - hour_start: 17
      hour_end:   20
      label:      "evening_peak"
      occupied_multiplier: 1.8    # highest congestion 17:00–20:00

    - hour_start: 22
      hour_end:   6
      label:      "overnight"
      occupied_multiplier: 0.4    # low demand overnight

  # -------------------------------------------------------------------------
  # Station-class modifiers
  # -------------------------------------------------------------------------
  # Additive delta on p_broken and multiplicative factor on
  # p_occupied_given_not_broken per station class.
  # Station class is determined from the charger dataset column "access"
  # or "station_class" if present; defaults to "highway_corridor".
  station_class_modifiers:
    highway_corridor:
      p_broken_delta:      -0.02   # corridor stations better maintained
      occupied_multiplier:  1.20   # busier than average

    urban:
      p_broken_delta:       0.03   # higher vandalism / usage stress
      occupied_multiplier:  1.40

    depot:
      p_broken_delta:      -0.04   # private / managed fleet depots
      occupied_multiplier:  0.60   # low public use

    # Default fallback (applied when station class is unknown)
    unknown:
      p_broken_delta:       0.00
      occupied_multiplier:  1.00

  # -------------------------------------------------------------------------
  # Pilot congestion scenario presets
  # -------------------------------------------------------------------------
  # Named presets for quick scenario comparisons.  Reference by name in
  # scripts/compare_charger_scenarios.R or as CLI arguments.
  congestion_presets:
    baseline:
      p_broken:                    0.02
      p_occupied_given_not_broken: 0.10
      note: "Low-congestion baseline (near-ideal infrastructure)"

    moderate:
      p_broken:                    0.05
      p_occupied_given_not_broken: 0.25
      note: "Moderate congestion / partial buildout"

    stressed:
      p_broken:                    0.12
      p_occupied_given_not_broken: 0.50
      note: "High-stress scenario: underbuilt or poorly maintained network"

    severe:
      p_broken:                    0.20
      p_occupied_given_not_broken: 0.70
      note: "Worst-case: early-adoption era with sparse reliable charging"
